<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login SportClub</title>

    <link rel="stylesheet" href="./css/style_login.css">
</head>

<body>

    <main class="contenedor-login">

        <!-- Logo -->
        <header class="logo">

            <img
                src="./img/logo.png"
                alt="Logo SportClub">

        </header>

        <!-- Caja Login -->
        <section class="caja-login">

            <h2>Login</h2>

            <!-- Formulario -->
            <form>

                <!-- Email -->
                <div class="grupo-input">

                    <label for="correo">
                        Email:
                    </label>

                    <input
                        type="email"
                        id="correo"
                        placeholder="Ingresa tu correo"
                        required>

                </div>

                <!-- Contraseña -->
                <div class="grupo-input">

                    <label for="password">
                        Contraseña:
                    </label>

                    <input
                        type="password"
                        id="password"
                        placeholder="Ingresa tu contraseña"
                        required>

                </div>

                <!-- Botón -->
                <button type="submit">
                    Ingresar
                </button>

            </form>

            <!-- Links -->
            <nav class="links-login">

                <a href="#">
                    ¿Olvidaste tu contraseña?
                </a>

                <span>|</span>

                <a href="#">
                    Registrarse
                </a>

            </nav>

        </section>

    </main>

</body>

</html>
