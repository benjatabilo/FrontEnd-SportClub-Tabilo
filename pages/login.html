<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | SportClub</title>

    <link rel="stylesheet" href="../css/style_login.css">
</head>

<body>

    <main class="login">

        <img 
            src="../img/logo.png" 
            alt="Logo SportClub"
            class="logo"
        >

        <section class="card">

            <h1>Iniciar Sesión</h1>

            <form>

                <input
                    type="email"
                    placeholder="Correo electrónico"
                    required
                >

                <input
                    type="password"
                    placeholder="Contraseña"
                    required
                >

                <button type="submit">
                    Ingresar
                </button>
                <!--Se agrega funcion para vincular el boton con el perfil usuario-->
            </form action="dashboard_user.html">

            <div class="links">

                <a href="./recuperar.html">
                    ¿Olvidaste tu contraseña?
                </a>

                <!-- ENLACE AL REGISTER -->
                <a href="./register.html">
                    Registrarse
                </a>

            </div>
<!--ACCESOS DIRECTOS PARA COACH Y ADM*/-->
            <div class="accesos">
                <p>Accesos Rapidos</p>
                <a href="dashboard_coach.html"
                    Dashboard Coach
                </a>
                <a href=""dashboard_admin.html>
                    Dashboard Administrador
                </a>

                

            </div>

        </section>

    </main>

</body>

</html>
