<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | SportClub</title>

    <link rel="stylesheet" href="../css/style_login.css">
</head>

<body>

    <!-- =========================
         HEADER
    ========================== -->

    <header>

        <!-- LOGO -->
        <div class="logo-header">
            <img src="../img/logo.png" alt="Logo SportClub">
        </div>

        <!-- NAVBAR -->
        <nav>
            <a href="../index.html">Inicio</a>
            <a href="../index.html#planes">Planes</a>
            <a href="../index.html#beneficios">Beneficios</a>
            <a href="../index.html#contacto">Contacto</a>

            <a href="./login.html" class="btn-login">
                Login
            </a>
        </nav>

    </header>

    <!-- =========================
         LOGIN
    ========================== -->

    <main class="login-container">

        <section class="card">

            <!-- LOGO -->
            <img 
                src="../img/logo.png" 
                alt="Logo SportClub"
                class="logo"
            >

            <h1>Iniciar Sesión</h1>

            <!-- FORM -->
            <form action="./dashboard_usuario.html">

                <input
                    type="email"
                    placeholder="Correo electrónico"
                    required
                >

                <input
                    type="password"
                    placeholder="Contraseña"
                    required
                >

                <button type="submit">
                    Ingresar
                </button>

            </form>

            <!-- LINKS -->
            <div class="links">

                <a href="./recuperar.html">
                    ¿Olvidaste tu contraseña?
                </a>

                <a href="./register.html">
                    Registrarse
                </a>

            </div>

            <!-- ACCESOS -->
            <div class="accesos">

                <p>Accesos rápidos</p>

                <a href="./dashboard_usuario.html">
                    Dashboard Usuario
                </a>

                <a href="./dashboard_coach.html">
                    Dashboard Coach
                </a>

                <a href="./dashboard_admin.html">
                    Dashboard Administrador
                </a>

            </div>

        </section>

    </main>

</body>

</html>
