<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Registro - SportClub</title>

    <link rel="stylesheet" href="../css/style_register.css">
</head>

<body>

    <!-- HEADER -->
    <header>

        <div class="logo-nav">
            <img src="../img/logo.png" alt="Logo SportClub">
        </div>

        <nav>
            <a href="../index.html">Inicio</a>
            <a href="../index.html#planes">Planes</a>
            <a href="../index.html#beneficios">Beneficios</a>
            <a href="../index.html#contacto">Contacto</a>

            <a href="./login.html" class="btn-login">
                Login
            </a>
        </nav>

    </header>

    <!-- CONTENEDOR -->
    <main class="contenedor">

        <section class="register-box">

            <img src="../img/logo.png" alt="Logo SportClub" class="logo">

            <h1>Crear Cuenta</h1>

            <form>

                <label for="nombre">Nombre completo</label>

                <input 
                    type="text" 
                    id="nombre" 
                    placeholder="Ingrese su nombre completo"
                    required
                >

                <label for="fechaNacimiento">
                    Fecha de nacimiento
                </label>

                <input 
                    type="date" 
                    id="fechaNacimiento"
                    required
                >

                <p class="mensaje-error">
                    Debe ser mayor de 16 años.
                </p>

                <label for="deporte">
                    ¿Practica deporte?
                </label>

                <select id="deporte">

                    <option>
                        Seleccione una opción
                    </option>

                    <option>
                        Sí
                    </option>

                    <option>
                        No
                    </option>

                </select>

                <label for="actividad">
                    Actividad de interés
                </label>

                <input 
                    type="text" 
                    id="actividad" 
                    placeholder="Ej: Gym, Running, Fútbol"
                >

                <label for="objetivos">
                    Información adicional
                </label>

                <textarea 
                    id="objetivos"
                    placeholder="Opcional"
                ></textarea>

                <label for="correo">
                    Correo electrónico
                </label>

                <input 
                    type="email" 
                    id="correo" 
                    placeholder="Ingrese su correo"
                    required
                >

                <p class="mensaje-error">
                    Correo inválido.
                </p>

                <label for="password">
                    Crear contraseña
                </label>

                <input 
                    type="password" 
                    id="password"
                    placeholder="Ingrese su contraseña"
                    required
                >

                <label for="confirmPassword">
                    Confirmar contraseña
                </label>

                <input 
                    type="password" 
                    id="confirmPassword"
                    placeholder="Repita su contraseña"
                    required
                >

                <p class="mensaje-error">
                    Las contraseñas no coinciden.
                </p>

                <div class="mensaje-exito">
                    Usuario registrado correctamente.
                </div>

                <button type="submit">
                    Registrarse
                </button>

            </form>

            <p class="login-link">

                ¿Ya tienes cuenta?

                <a href="./login.html">
                    Iniciar Sesión
                </a>

            </p>

        </section>

    </main>

</body>

</html>
