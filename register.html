<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Registro | SportClub</title>

    <link rel="stylesheet" href="./css/style_registro.css">
</head>

<body>

    <main class="registro">

        <img
            src="./img/logo.png"
            alt="Logo SportClub"
            class="logo"
        >

        <section class="card">

            <h1>Crear Cuenta</h1>

            <form>

                <input
                    type="text"
                    placeholder="Nombre completo"
                    required
                >

                <input
                    type="number"
                    placeholder="Edad"
                    required
                >

                <select required>
                    <option value="">
                        ¿Practicas deporte?
                    </option>

                    <option>
                        Sí
                    </option>

                    <option>
                        No
                    </option>
                </select>

                <input
                    type="text"
                    placeholder="Actividad de interés"
                    required
                >

                <textarea
                    placeholder="¿Cuáles son tus objetivos?"
                    rows="4"
                    required
                ></textarea>

                <input
                    type="email"
                    placeholder="Correo electrónico"
                    required
                >

                <input
                    type="password"
                    placeholder="Crear contraseña"
                    required
                >

                <button type="submit">
                    Registrarse
                </button>

            </form>

            <div class="links">

                <a href="./Login.html">
                    Volver al login
                </a>

            </div>

        </section>

    </main>

</body>

</html>
