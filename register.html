<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - SportClub</title>

    <link rel="stylesheet" href="./css/style_register.css">
</head>

<body>

    <main class="contenedor">

        <section class="register-box">

            <img src="./img/logo.png" alt="Logo SportClub" class="logo">

            <h1>Crear Cuenta</h1>

            <form>

                <label for="nombre">Nombre completo</label>
                <input type="text" id="nombre" placeholder="Ingrese su nombre completo">

                <label for="edad">Edad</label>
                <input type="number" id="edad" min="16" placeholder="Debe ser mayor de 16 años">

                <label for="deporte">¿Practica deporte?</label>
                <select id="deporte">
                    <option>Seleccione una opción</option>
                    <option>Sí</option>
                    <option>No</option>
                </select>

                <label for="actividad">Actividad de interés</label>
                <input type="text" id="actividad" placeholder="Ej: Gym, Running, Fútbol">

                <label for="objetivos">Objetivos</label>
                <textarea id="objetivos" placeholder="Escriba sus objetivos"></textarea>

                <label for="correo">Correo electrónico</label>
                <input type="email" id="correo" placeholder="Ingrese su correo">

                <label for="password">Crear contraseña</label>
                <input type="password" id="password" placeholder="Ingrese su contraseña">

                <button type="submit">Registrarse</button>

            </form>

            <p class="login-link">
                ¿Ya tienes cuenta?
                <a href="Login.html">Iniciar sesión</a>
            </p>

        </section>

    </main>

</body>

</html>
