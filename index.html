<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | SportClub</title>

    <link rel="stylesheet" href="./css/style_login.css">
</head>

<body>

    <main class="login">

        <img 
            src="./img/logo.png" 
            alt="Logo SportClub"
            class="logo"
        >

        <section class="card">

            <h1>Iniciar Sesión</h1>

            <form>

                <input
                    type="email"
                    placeholder="Correo electrónico"
                    required
                >

                <input
                    type="password"
                    placeholder="Contraseña"
                    required
                >

                <button type="submit">
                    Ingresar
                </button>

            </form>

            <div class="links">

                <a href="#">
                    ¿Olvidaste tu contraseña?
                </a>

                <!-- ENLACE AL REGISTER -->
                <a href="register.html">
                    Registrarse
                </a>

            </div>

        </section>

    </main>

</body>

</html>
